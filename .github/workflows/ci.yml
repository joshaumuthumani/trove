name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      # Full Workers build (same command Workers Builds deploys with) so a
      # build-breaking change is caught here, not on deploy.
      - run: npx opennextjs-cloudflare build
